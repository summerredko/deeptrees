<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .logo {
            max-width: 500px;
            margin-bottom: 20px;
        }

        .message {
            font-size: 24px;
            color: #333;
        }
    </style>
</head>

<body>
    <img src="images/deeptrees.png" alt="Logo" class="logo">
    <div class="message">Something is taking off… the new record <i>Smoking in Airports</i> lands in 2025!</div>
</body>

</html>
